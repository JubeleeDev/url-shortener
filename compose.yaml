services:
  url-shortener:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - HTTP_ADDR=:8080
      - CODE_LENGTH=15
    ports:
      - "8080:8080"
    depends_on:
      - db
  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: